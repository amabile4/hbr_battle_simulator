<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>HBR Battle Simulator — ui-next</title>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet" />
  <script type="importmap">
    {
      "imports": {
        "node:fs": "../ui/shims/node-fs.js",
        "node:path": "../ui/shims/node-path.js"
      }
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="bg-gray-50 text-gray-900 h-screen h-dvh flex flex-col overflow-hidden">

  <!-- ヘッダー -->
  <header class="bg-white border-b border-gray-200 px-4 py-2 flex items-center gap-3 shrink-0">
    <h1 class="text-base font-bold tracking-tight">HBR Battle Simulator</h1>
    <span class="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded">ui-next</span>
    <!-- 右ペイン開閉ボタン -->
    <button id="toggle-setup"
            class="ml-auto text-xs px-2.5 py-1 rounded-md border border-gray-200
                   text-gray-500 hover:bg-gray-50 transition-colors"
            title="Initial Setup を開閉">
      ⚙ 設定 ◀
    </button>
    <a href="../ui/index.html" class="text-xs text-blue-500 hover:underline">旧UI へ</a>
  </header>

  <!-- メインレイアウト: 左ペイン + 右ペイン（モバイルは縦積み） -->
  <main id="app" class="flex-1 flex flex-col-reverse sm:flex-row overflow-hidden">

    <!-- 左ペイン: TurnController / Records（モバイルでは下段） -->
    <section id="turn-area" class="flex-1 overflow-y-auto p-2 sm:p-6 min-h-0">
      <div class="text-sm text-gray-400 text-center py-16 border-2 border-dashed border-gray-200 rounded-xl">
        TurnController &amp; Records<br />
        <span class="text-xs">(TODO)</span>
      </div>
    </section>

    <!-- 右ペイン: InitialSetup（モバイルでは上段 full-width） -->
    <aside id="setup-area"
           class="w-full sm:w-96 shrink-0 overflow-y-auto bg-white
                  border-b sm:border-b-0 sm:border-l border-gray-200
                  max-h-[50dvh] sm:max-h-none
                  transition-[transform,max-height,width] duration-300">
      <div id="initial-setup-root"></div>
    </aside>

  </main>

  <!-- Style Picker: 全画面オーバーレイ -->
  <div id="style-picker-overlay" class="hidden fixed inset-0 z-50"></div>

  <!-- エラー表示 -->
  <div data-role="status" class="hidden fixed right-4 bg-red-100 text-red-700 text-sm px-4 py-2 rounded-lg shadow-md pb-safe"
       style="bottom: max(1rem, env(safe-area-inset-bottom))"></div>

  <script type="module" src="./app.js"></script>
  <script>
    const toggleBtn = document.getElementById('toggle-setup');
    const setupArea = document.getElementById('setup-area');
    let setupOpen = true;

    function isMobile() {
      return window.innerWidth < 640;
    }

    function applySetupOpen(open) {
      setupOpen = open;
      if (open) {
        setupArea.style.transform = '';
        setupArea.style.width = '';
        setupArea.style.minWidth = '';
        setupArea.style.maxHeight = '';
        setupArea.style.overflow = '';
        toggleBtn.textContent = isMobile() ? '⚙ 設定 ▼' : '⚙ 設定 ◀';
      } else {
        if (isMobile()) {
          setupArea.style.maxHeight = '0';
          setupArea.style.overflow = 'hidden';
          toggleBtn.textContent = '⚙ 設定 ▲';
        } else {
          setupArea.style.transform = 'translateX(100%)';
          setupArea.style.width = '0';
          setupArea.style.minWidth = '0';
          toggleBtn.textContent = '⚙ 設定 ▶';
        }
      }
    }

    toggleBtn.addEventListener('click', () => applySetupOpen(!setupOpen));

    // リサイズ時にスライドアウト状態を再適用（横断切替でスタイルが崩れないよう）
    window.addEventListener('resize', () => applySetupOpen(setupOpen));

    // app.js から Apply 後に呼び出して右ペインを閉じる
    window.collapseSetup = () => applySetupOpen(false);
  </script>
</body>
</html>
