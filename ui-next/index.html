<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>HBR Battle Simulator — ui-next</title>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet" />
  <script type="importmap">
    {
      "imports": {
        "node:fs": "./shims/node-fs.js",
        "node:path": "./shims/node-path.js"
      }
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./styles.css" />
  <!-- preload: 大容量 JSON を app.js 実行前から fetch 開始 -->
  <link rel="preload" href="../json/styles.json" as="fetch" crossorigin>
  <link rel="preload" href="../json/skills.json" as="fetch" crossorigin>
  <link rel="preload" href="../json/passives.json" as="fetch" crossorigin>
  <link rel="preload" href="../json/characters.json" as="fetch" crossorigin>
  <link rel="preload" href="../json/accessories.json" as="fetch" crossorigin>
</head>
<body class="bg-gray-50 text-gray-900 h-screen h-dvh flex flex-col overflow-hidden">

  <!-- ヘッダー -->
  <header class="shrink-0 border-b border-gray-200 bg-white/95 backdrop-blur">
    <!-- Toolbar icons sourced from Heroicons (MIT): https://github.com/tailwindlabs/heroicons -->
    <div class="workspace-toolbar">
      <button id="quick-help-operations"
              class="workspace-toolbar__button workspace-toolbar__button--help"
              data-role="toolbar-quick-help"
              data-help-kind="operations"
              title="クリック/右クリック/長押しで操作説明を表示"
              aria-label="操作説明ヘルプ">
        <span class="help-btn__text" aria-hidden="true">
          <span>敵情報確認</span>
          <span>キャラアイコン</span>
        </span>
        <span class="help-btn__mouse" aria-hidden="true">
          <span class="help-btn__mouse-r-glow"></span>
        </span>
        <span class="help-btn__touch" aria-hidden="true">
          <span class="help-btn__touch-tip-glow"></span>
        </span>
      </button>
      <button id="toggle-setup"
              class="workspace-toolbar__button"
              title="Initial Setup を隠す"
              aria-label="設定を隠す">
        <span class="workspace-toolbar__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M9.59356 3.94014C9.68397 3.39768 10.1533 3.00009 10.7033 3.00009H13.2972C13.8472 3.00009 14.3165 3.39768 14.4069 3.94014L14.6204 5.22119C14.6828 5.59523 14.9327 5.9068 15.2645 6.09045C15.3387 6.13151 15.412 6.17393 15.4844 6.21766C15.8095 6.41393 16.2048 6.47495 16.5604 6.34175L17.7772 5.88587C18.2922 5.69293 18.8712 5.9006 19.1462 6.37687L20.4432 8.6233C20.7181 9.09957 20.6085 9.70482 20.1839 10.0544L19.1795 10.8812C18.887 11.122 18.742 11.4938 18.7491 11.8726C18.7498 11.915 18.7502 11.9575 18.7502 12.0001C18.7502 12.0427 18.7498 12.0852 18.7491 12.1275C18.742 12.5064 18.887 12.8782 19.1795 13.119L20.1839 13.9458C20.6085 14.2953 20.7181 14.9006 20.4432 15.3769L19.1462 17.6233C18.8712 18.0996 18.2922 18.3072 17.7772 18.1143L16.5604 17.6584C16.2048 17.5252 15.8095 17.5862 15.4844 17.7825C15.412 17.8263 15.3387 17.8687 15.2645 17.9097C14.9327 18.0934 14.6828 18.4049 14.6204 18.779L14.4069 20.06C14.3165 20.6025 13.8472 21.0001 13.2972 21.0001H10.7033C10.1533 21.0001 9.68397 20.6025 9.59356 20.06L9.38005 18.779C9.31771 18.4049 9.06774 18.0934 8.73597 17.9097C8.66179 17.8687 8.58847 17.8263 8.51604 17.7825C8.19101 17.5863 7.79568 17.5252 7.44011 17.6584L6.22325 18.1143C5.70826 18.3072 5.12926 18.0996 4.85429 17.6233L3.55731 15.3769C3.28234 14.9006 3.39199 14.2954 3.81657 13.9458L4.82092 13.119C5.11343 12.8782 5.25843 12.5064 5.25141 12.1276C5.25063 12.0852 5.25023 12.0427 5.25023 12.0001C5.25023 11.9575 5.25063 11.915 5.25141 11.8726C5.25843 11.4938 5.11343 11.122 4.82092 10.8812L3.81657 10.0544C3.39199 9.70484 3.28234 9.09958 3.55731 8.62332L4.85429 6.37688C5.12926 5.90061 5.70825 5.69295 6.22325 5.88588L7.4401 6.34176C7.79566 6.47496 8.19099 6.41394 8.51603 6.21767C8.58846 6.17393 8.66179 6.13151 8.73597 6.09045C9.06774 5.9068 9.31771 5.59523 9.38005 5.22119L9.59356 3.94014Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M15 12C15 13.6569 13.6569 15 12 15C10.3431 15 9 13.6569 9 12C9 10.3432 10.3431 9.00001 12 9.00001C13.6569 9.00001 15 10.3432 15 12Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span data-role="toolbar-label" class="workspace-toolbar__label">設定を隠す</span>
      </button>
      <button id="toggle-passive-log"
              class="workspace-toolbar__button"
              title="Passive Log を表示"
              aria-label="ログを表示"
              disabled>
        <span class="workspace-toolbar__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M19.5 14.25V11.625C19.5 9.76104 17.989 8.25 16.125 8.25H14.625C14.0037 8.25 13.5 7.74632 13.5 7.125V5.625C13.5 3.76104 11.989 2.25 10.125 2.25H8.25M8.25 15H15.75M8.25 18H12M10.5 2.25H5.625C5.00368 2.25 4.5 2.75368 4.5 3.375V20.625C4.5 21.2463 5.00368 21.75 5.625 21.75H18.375C18.9963 21.75 19.5 21.2463 19.5 20.625V11.25C19.5 6.27944 15.4706 2.25 10.5 2.25Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span data-role="toolbar-label" class="workspace-toolbar__label">ログを表示</span>
      </button>
      <button id="toggle-used-skills"
              class="workspace-toolbar__button"
              title="使用スキル一覧を表示"
              aria-label="使用スキルを表示">
        <span class="workspace-toolbar__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M9.75 6.75H20.25M9.75 12H20.25M9.75 17.25H20.25" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M4.5 6.75H4.5075V6.7575H4.5V6.75ZM4.5 12H4.5075V12.0075H4.5V12ZM4.5 17.25H4.5075V17.2575H4.5V17.25Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span data-role="toolbar-label" class="workspace-toolbar__label">使用スキルを表示</span>
      </button>
      <button id="session-save-btn"
              class="workspace-toolbar__button"
              title="現在のセッションを JSON 保存"
              aria-label="JSON保存">
        <span class="workspace-toolbar__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M3 16.5V18.75C3 19.9926 4.00736 21 5.25 21H18.75C19.9926 21 21 19.9926 21 18.75V16.5M16.5 12L12 16.5M12 16.5L7.5 12M12 16.5V3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span data-role="toolbar-label" class="workspace-toolbar__label">JSON保存</span>
      </button>
      <button id="session-load-btn"
              class="workspace-toolbar__button"
              title="保存済み JSON を読み込む"
              aria-label="JSON読込">
        <span class="workspace-toolbar__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M3 16.5V18.75C3 19.9926 4.00736 21 5.25 21H18.75C19.9926 21 21 19.9926 21 18.75V16.5M7.5 7.5L12 3M12 3L16.5 7.5M12 3L12 16.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span data-role="toolbar-label" class="workspace-toolbar__label">JSON読込</span>
      </button>
      <input id="session-load-input"
             type="file"
             accept="application/json,.json"
             hidden />
      <button id="toggle-turn-layout"
              class="workspace-toolbar__button workspace-toolbar__button--desktop-only"
              title="TurnEdit の前衛/後衛幅レイアウトを切り替え"
              aria-label="レイアウト: 均等">
        <span data-role="toolbar-label" class="workspace-toolbar__label">レイアウト: 均等</span>
      </button>
      <button id="capture-btn"
              class="workspace-toolbar__button"
              title="ターンエリアを PNG 保存"
              aria-label="PNG保存">
        <span class="workspace-toolbar__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M6.82689 6.1749C6.46581 6.75354 5.86127 7.13398 5.186 7.22994C4.80655 7.28386 4.42853 7.34223 4.05199 7.40497C2.99912 7.58042 2.25 8.50663 2.25 9.57402V18C2.25 19.2426 3.25736 20.25 4.5 20.25H19.5C20.7426 20.25 21.75 19.2426 21.75 18V9.57403C21.75 8.50664 21.0009 7.58043 19.948 7.40498C19.5715 7.34223 19.1934 7.28387 18.814 7.22995C18.1387 7.13398 17.5342 6.75354 17.1731 6.17491L16.3519 4.85889C15.9734 4.25237 15.3294 3.85838 14.6155 3.82005C13.7496 3.77355 12.8775 3.75 12 3.75C11.1225 3.75 10.2504 3.77355 9.3845 3.82005C8.6706 3.85838 8.02658 4.25237 7.64809 4.85889L6.82689 6.1749Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M16.5 12.75C16.5 15.2353 14.4853 17.25 12 17.25C9.51472 17.25 7.5 15.2353 7.5 12.75C7.5 10.2647 9.51472 8.25 12 8.25C14.4853 8.25 16.5 10.2647 16.5 12.75Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M18.75 10.5H18.7575V10.5075H18.75V10.5Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span data-role="toolbar-label" class="workspace-toolbar__label">PNG保存</span>
      </button>
    </div>
    <div id="party-preset-toolbar" class="party-preset-toolbar"></div>
  </header>

  <!-- メインレイアウト: 左ペイン + 右ペイン（モバイルは縦積み） -->
  <main id="app" data-setup-open="true" data-passive-log-open="false"
        class="flex-1 flex flex-col-reverse sm:flex-row overflow-hidden min-h-0">

    <!-- 左ペイン: TurnController / Records + Passive Log -->
    <section id="workspace-main" class="flex min-h-0 flex-1 flex-col">
      <section id="turn-area" class="flex-1 overflow-y-auto p-2 sm:p-4 min-h-0">
        <div class="text-sm text-gray-400 text-center py-16 border-2 border-dashed border-gray-200 rounded-xl">
          TurnController &amp; Records<br />
          <span class="text-xs">(TODO)</span>
        </div>
      </section>
      <section id="passive-log-pane"
               hidden
               class="min-h-0 border-t border-gray-200 bg-white max-h-[38dvh] sm:max-h-none"></section>
    </section>

    <!-- 右ペイン: InitialSetup（モバイルでは上段 full-width） -->
    <aside id="setup-area"
           class="w-full sm:w-96 shrink-0 overflow-y-auto bg-white
                  border-b sm:border-b-0 sm:border-l border-gray-200
                  max-h-[50dvh] sm:max-h-none">
      <div id="initial-setup-root" class="h-full"></div>
    </aside>

  </main>

  <!-- Style Picker: 全画面オーバーレイ -->
  <div id="style-picker-overlay" class="hidden fixed inset-0 z-50"></div>
  <div id="used-skills-overlay" class="hidden fixed inset-0 z-50"></div>

  <!-- エラー表示 -->
  <div data-role="status" role="status" aria-live="polite" aria-atomic="true"
       class="hidden fixed right-4 text-sm px-4 py-2 rounded-lg shadow-md pb-safe"
       style="bottom: max(1rem, env(safe-area-inset-bottom))"></div>

  <script type="module" src="./app.js"></script>
</body>
</html>
