name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Pin npm 10.9.7
        run: npm install --global npm@10.9.7

      - name: Verify npm version
        run: test "$(npm --version)" = "10.9.7"

      - run: npm ci

      - name: Run tests
        run: npm test

      - name: Run calc fixture regression
        run: npm run test:calc

      - name: Run lint
        run: npm run lint
